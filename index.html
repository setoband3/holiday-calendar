<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>会社休日カレンダー</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --holiday: #e63946; --today: #457b9d; --text: #1d3557; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .calendar-card { background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 380px; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-label { font-size: 1.4em; font-weight: bold; }
        .btn { background: #eee; border: none; padding: 10px 18px; border-radius: 8px; font-size: 1em; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { color: #888; font-size: 0.8em; padding-bottom: 10px; }
        td { text-align: center; padding: 12px 0; font-weight: 500; position: relative; width: 14.28%; }
        .holiday { background: var(--holiday); color: white; border-radius: 50%; }
        .today { border: 2px solid var(--today); border-radius: 50%; color: var(--today); }
        .period-info { margin-top: 20px; font-size: 0.8em; color: #666; text-align: center; }
    </style>
</head>
<body>

    <div class="calendar-card">
        <div class="header">
            <button class="btn" onclick="moveMonth(-1)">◀</button>
            <div id="monthDisplay" class="month-label"></div>
            <button class="btn" onclick="moveMonth(1)">▶</button>
        </div>
        <table id="calendar">
            <thead>
                <tr><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th><th>日</th></tr>
            </thead>
            <tbody id="calendarBody"></tbody>
        </table>
    </div>

    <div class="period-info">
        ※画像で指定された休日を反映済み
    </div>

    <script>
        // --- 送っていただいた画像から抽出した休日リスト ---
        const holidays = [
            // 2026年 3月
            "2026-03-01", "2026-03-07", "2026-03-08", "2026-03-15", "2026-03-20", "2026-03-21", "2026-03-22", "2026-03-29",
            // 2026年 4月
            "2026-04-04", "2026-04-05", "2026-04-11", "2026-04-12", "2026-04-19", "2026-04-25", "2026-04-26", "2026-04-29",
            // 2026年 5月
            "2026-05-03", "2026-05-04", "2026-05-05", "2026-05-06", "2026-05-10", "2026-05-17", "2026-05-24", "2026-05-30", "2026-05-31",
            // 2026年 6月
            "2026-06-06", "2026-06-07", "2026-06-13", "2026-06-14"
        ];

        let viewDate = new Date();

        function render() {
            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            document.getElementById("monthDisplay").innerText = `${y}年 ${m + 1}月`;
            
            let firstDay = new Date(y, m, 1).getDay();
            firstDay = (firstDay === 0) ? 6 : firstDay - 1; 

            const lastDate = new Date(y, m + 1, 0).getDate();
            const body = document.getElementById("calendarBody");
            body.innerHTML = "";
            
            let date = 1;
            const todayStr = new Date().toLocaleDateString('sv-SE');

            for (let i = 0; i < 6; i++) {
                let row = document.createElement("tr");
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement("td");
                    if (i === 0 && j < firstDay || date > lastDate) {
                        cell.innerText = "";
                    } else {
                        const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                        cell.innerText = date;
                        if (holidays.includes(dStr)) cell.classList.add("holiday");
                        if (dStr === todayStr) cell.classList.add("today");
                        date++;
                    }
                    row.appendChild(cell);
                }
                body.appendChild(row);
                if (date > lastDate) break;
            }
        }

        function moveMonth(d) { viewDate.setMonth(viewDate.getMonth() + d); render(); }
        render();
    </script>
</body>
</html>
