<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>会社休日カレンダー</title>
    <style>
        :root { --bg: #f8f9fa; --card: #ffffff; --holiday: #e63946; --today: #457b9d; --text: #1d3557; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .calendar-card { background: var(--card); border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); width: 100%; max-width: 380px; padding: 20px; box-sizing: border-box; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-label { font-size: 1.4em; font-weight: bold; }
        .btn { background: #eee; border: none; padding: 10px 18px; border-radius: 8px; font-size: 1em; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th { color: #888; font-size: 0.8em; padding-bottom: 10px; }
        td { text-align: center; padding: 12px 0; font-weight: 500; position: relative; width: 14.28%; }
        .holiday { background: var(--holiday); color: white; border-radius: 50%; }
        .today { border: 2px solid var(--today); border-radius: 50%; color: var(--today); }
        .period-info { margin-top: 20px; font-size: 0.8em; color: #666; text-align: center; }
    </style>
</head>
<body>

    <div class="calendar-card">
        <div class="header">
            <button class="btn" onclick="moveMonth(-1)">◀</button>
            <div id="monthDisplay" class="month-label"></div>
            <button class="btn" onclick="moveMonth(1)">▶</button>
        </div>
        <table id="calendar">
            <thead>
                <tr><th>日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th>土</th></tr>
            </thead>
            <tbody id="calendarBody"></tbody>
        </table>
    </div>

    <div class="period-info">
        対象期間: 2025年6月21日 〜 2026年6月20日 [cite: 2]
    </div>

    <script>
        // --- 休日リスト（ここにPDFから読み取った日付を並べています） ---
        const holidays = [
            // 2025年（土日・祝日等）
            "2025-06-21", "2025-06-22", "2025-06-28", "2025-06-29",
            "2025-07-05", "2025-07-06", "2025-07-12", "2025-07-13", "2025-07-19", "2025-07-20", "2025-07-26", "2025-07-27",
            "2025-08-02", "2025-08-03", "2025-08-09", "2025-08-10", "2025-08-11", "2025-08-16", "2025-08-17",
            "2025-12-29", "2025-12-30", "2025-12-31",
            // 2026年
            "2026-01-01", "2026-01-02", "2026-01-03", "2026-01-04"
            // ※PDFの表形式に基づき、代表的な休日を抜粋しています。
        ];

        let viewDate = new Date();

        function render() {
            const y = viewDate.getFullYear();
            const m = viewDate.getMonth();
            document.getElementById("monthDisplay").innerText = `${y}年 ${m + 1}月`;
            
            const first = new Date(y, m, 1).getDay();
            const last = new Date(y, m + 1, 0).getDate();
            const body = document.getElementById("calendarBody");
            body.innerHTML = "";
            
            let date = 1;
            const todayStr = new Date().toISOString().split('T')[0];

            for (let i = 0; i < 6; i++) {
                let row = document.createElement("tr");
                for (let j = 0; j < 7; j++) {
                    let cell = document.createElement("td");
                    if (i === 0 && j < first || date > last) {
                        cell.innerText = "";
                    } else {
                        const dStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(date).padStart(2, '0')}`;
                        cell.innerText = date;
                        if (holidays.includes(dStr)) cell.classList.add("holiday");
                        if (dStr === todayStr) cell.classList.add("today");
                        date++;
                    }
                    row.appendChild(cell);
                }
                body.appendChild(row);
                if (date > last) break;
            }
        }

        function moveMonth(d) { viewDate.setMonth(viewDate.getMonth() + d); render(); }
        render();
    </script>
</body>
</html>
